<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Econ Solver - Step-by-Step</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #1a1a1a; }
        .card { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2563eb; margin-top: 0; border-bottom: 2px solid #e5e7eb; padding-bottom: 15px; }
        .step { background: #ffffff; padding: 20px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #4b5563; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        button { width: 100%; padding: 16px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        #results { margin-top: 25px; padding: 20px; background: #f0fdf4; border-radius: 8px; display: none; border-left: 5px solid #22c55e; }
        #steps-log { margin-top: 15px; padding: 15px; background: #fffbeb; border: 1px solid #fef08a; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.5; color: #854d0e; }
        canvas { width: 100%; background: white; border: 1px solid #e5e7eb; margin-top: 25px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cash Flow Solver</h2>

    <div class="step">
        <label>1. Number of Years (n):</label>
        <input type="number" id="n_val" value="5">
        <label>2. Interest Rate (i %):</label>
        <input type="number" id="i_rate" value="10">
    </div>

    <div class="step">
        <label>3. Select Flow Type:</label>
        <select id="type" onchange="showInputs()">
            <option value="">-- Choose Type --</option>
            <option value="single">Single Payment</option>
            <option value="uniform">Uniform Series (A)</option>
            <option value="gradient">Gradient (G)</option>
        </select>
    </div>

    <div id="dynamic_step" class="step" style="display:none;">
        <div id="input_container" class="input-grid"></div>
        <button onclick="calculate()" style="margin-top:20px;">Solve & Draw Diagram</button>
    </div>

    <div id="results">
        <strong>Present Worth (PW):</strong> <span id="pw_out"></span><br>
        <strong>Future Worth (FW):</strong> <span id="fw_out"></span><br>
        <strong>Annual Worth (AW):</strong> <span id="aw_out"></span>
        <div id="steps-log"></div>
    </div>

    <canvas id="cfCanvas" width="600" height="350"></canvas>
</div>

<script>
function showInputs() {
    const type = document.getElementById('type').value;
    const container = document.getElementById('input_container');
    const step = document.getElementById('dynamic_step');
    container.innerHTML = '';
    if (!type) { step.style.display = 'none'; return; }
    step.style.display = 'block';

    if (type === 'single') {
        container.innerHTML = `
            <div><label>Amount ($)</label><input type="number" id="box1" value="100"></div>
            <div><label>Starting Time</label><input type="number" id="box2" value="0"></div>
        `;
    } else if (type === 'uniform') {
        container.innerHTML = `
            <div><label>Amount ($)</label><input type="number" id="box1" value="50"></div>
            <div><label>Starting Time</label><input type="number" id="box2" value="1"></div>
            <div><label>End Time</label><input type="number" id="box3" value="5"></div>
        `;
    } else if (type === 'gradient') {
        container.innerHTML = `
            <div><label>Base Amount (A)</label><input type="number" id="box1" value="100"></div>
            <div><label>Starting Year</label><input type="number" id="box2" value="1"></div>
            <div><label>Gradient (G)</label><input type="number" id="box3" value="20"></div>
        `;
    }
}

function calculate() {
    const n = parseInt(document.getElementById('n_val').value);
    const i_input = parseFloat(document.getElementById('i_rate').value);
    const i = i_input / 100;
    const type = document.getElementById('type').value;
    const log = document.getElementById('steps-log');
    
    let pw = 0;
    let steps = "<b>SOLUTION STEPS:</b><br>";
    let flows = new Array(n + 1).fill(0);
    const val1 = parseFloat(document.getElementById('box1').value);
    const val2 = parseInt(document.getElementById('box2').value);

    if (type === 'single') {
        const factor = 1 / Math.pow(1 + i, val2);
        pw = val1 * factor;
        steps += `Logic: Move Single F to P at Yr 0<br>`;
        steps += `Formula: PW = ${val1} * (P/F, ${i_input}%, ${val2})<br>`;
        steps += `Factor Value: ${factor.toFixed(4)}<br>`;
        if(val2 <= n) flows[val2] = val1;
    } 
    else if (type === 'uniform') {
        const val3 = parseInt(document.getElementById('box3').value);
        const periods = val3 - val2 + 1;
        const pa_factor = (Math.pow(1 + i, periods) - 1) / (i * Math.pow(1 + i, periods));
        const discount_to_zero = 1 / Math.pow(1 + i, val2 - 1);
        pw = val1 * pa_factor * discount_to_zero;
        steps += `Logic: Convert A to P at Yr ${val2-1}, then move to Yr 0<br>`;
        steps += `Formula: PW = ${val1} * (P/A, ${i_input}%, ${periods}) * (P/F, ${i_input}%, ${val2-1})<br>`;
        steps += `Factors: (P/A)=${pa_factor.toFixed(4)}, (P/F)=${discount_to_zero.toFixed(4)}<br>`;
        for (let t = val2; t <= val3; t++) if(t <= n) flows[t] = val1;
    } 
    else if (type === 'gradient') {
        const val3 = parseFloat(document.getElementById('box3').value);
        const pa_factor = (Math.pow(1 + i, n) - 1) / (i * Math.pow(1 + i, n));
        const pg_factor = (1 / i) * (pa_factor - (n / Math.pow(1 + i, n)));
        pw = (val1 * pa_factor) + (val3 * pg_factor);
        steps += `Logic: Sum of Base A and Gradient G<br>`;
        steps += `Formula: PW = [A*(P/A)] + [G*(P/G)]<br>`;
        steps += `Factors: (P/A)=${pa_factor.toFixed(4)}, (P/G)=${pg_factor.toFixed(4)}<br>`;
        for (let t = val2; t <= n; t++) flows[t] = val1 + (val3 * (t - val2));
    }

    const fw = pw * Math.pow(1 + i, n);
    const aw = (i === 0) ? (pw / n) : pw * (i * Math.pow(1 + i, n)) / (Math.pow(1 + i, n) - 1);

    document.getElementById('results').style.display = 'block';
    log.innerHTML = steps;
    document.getElementById('pw_out').innerText = pw.toFixed(2);
    document.getElementById('fw_out').innerText = fw.toFixed(2);
    document.getElementById('aw_out').innerText = aw.toFixed(2);

    draw(flows, n);
}

function draw(flows, n) {
    const canvas = document.getElementById('cfCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 600, 350);
    const margin = 50; const centerY = 175; const stepSize = (600 - margin * 2) / n;
    ctx.beginPath(); ctx.moveTo(margin, centerY); ctx.lineTo(600 - margin, centerY);
    ctx.strokeStyle = "#4b5563"; ctx.lineWidth = 2; ctx.stroke();
    const maxVal = Math.max(...flows.map(Math.abs), 1);
    flows.forEach((amt, t) => {
        const x = margin + (t * stepSize);
        ctx.fillStyle = "#1f2937"; ctx.font = "bold 12px sans-serif";
        ctx.fillText(t, x - 5, centerY + 25);
        if (amt !== 0) {
            const h = (amt / maxVal) * 110;
            ctx.beginPath(); ctx.moveTo(x, centerY); ctx.lineTo(x, centerY - h);
            ctx.strokeStyle = amt > 0 ? "#10b981" : "#ef4444"; ctx.lineWidth = 4; ctx.stroke();
            ctx.fillStyle = amt > 0 ? "#065f46" : "#991b1b"; ctx.font = "10px sans-serif";
            ctx.fillText(amt.toFixed(0), x - 10, centerY - h + (amt > 0 ? -10 : 15));
            ctx.beginPath(); ctx.moveTo(x - 5, centerY - h + (amt > 0 ? 6 : -6)); ctx.lineTo(x, centerY - h); ctx.lineTo(x + 5, centerY - h + (amt > 0 ? 6 : -6)); ctx.stroke();
        }
    });
}
</script>
</body>
</html>
